name: Backup theme content from Shopify

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    name: Pull Customize content into git
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Pull theme editor content
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
          SHOPIFY_CLI_TTY: "0"
        run: |
          shopify theme pull \
            --theme "${{ secrets.SHOPIFY_THEME_ID }}" \
            --store "${{ secrets.SHOPIFY_FLAG_STORE }}" \
            --password "${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}" \
            --only config/settings_data.json \
            --only templates \
            --only sections/header-group.json \
            --only sections/footer-group.json

      - name: Commit backup if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/settings_data.json templates/ sections/header-group.json sections/footer-group.json
          if git diff --staged --quiet; then
            echo "No content changes to back up."
          else
            git commit -m "backup: sync theme editor content from Shopify"
            git push
          fi
